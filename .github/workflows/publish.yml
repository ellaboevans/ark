name: Package for Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # Package on version tags (v1.0.0, v1.0.1, etc.)

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package extension
        run: npm exec vsce -- package --out ./ark-${{ github.ref_name }}.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: ark-${{ github.ref_name }}
          path: ./ark-${{ github.ref_name }}.vsix
